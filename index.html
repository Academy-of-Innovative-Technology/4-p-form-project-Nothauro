<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Form 4.2</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <h1>Town Hall Login</h1>

  <form>
    <fieldset>
     <legend>Login Form</legend>

      <label for="username">Username</label>
      <input id="username" type="text" name="username" placeholder="Username" pattern="[A-Za-z0-9]{3,}" title="Alphanumeric, min 3 characters" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Password" required>

      <label for="email">Email Address</label>
      <input id="email" type="email" name="email" placeholder="Email Address" required>

      <fieldset>
        <legend>User Type</legend>
        <input id="role-resident" type="radio" name="role" value="resident" required>
        <label for="role-resident">Resident</label>

        <input id="role-visitor" type="radio" name="role" value="visitor">
        <label for="role-visitor">Visitor</label>
      </fieldset>

      <div>
        <input id="remember" type="checkbox" name="remember">
        <label for="remember">Remember me</label>
      </div>

      <label for="department">Department</label>
      <input id="department" list="departments" name="department" placeholder="Choose Department">
      <datalist id="departments">
        <option value="Parks &amp; Recreation">
        <option value="Public Works">
        <option value="Finance">
        <option value="Planning &amp; Development">
      </datalist>

      <input type="submit" value="Login">
      <input type="reset" value="Reset">
    </fieldset>
  </form>

  <div class="links">
    <a href="https://www.townhall.wa.gov/">Town Hall Website</a>
    <a href="https://www.townhall.wa.gov/OnlineServices/Pages/OnlineServices.aspx">Online Services</a>
    <a href="https://www.townhall.wa.gov/OnlineServices/Pages/OnlineServices.aspx">Contact Us</a>
  </div>

  <footer class="footer">
    <p>Copyright &copy; 2024 Town Hall. All rights reserved.</p>
  </footer>

</body>

</html>
